<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planoen bistaratzailea EITB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div id="sidebar-header">Planoak</div>
            <div id="file-tree"></div>
        </aside>

        <div id="content">
            <div id="toolbar">
                <button id="btn-toggle" title="Karpetак erakutsi/ezkutatu">&#9776;</button>
                <span id="current-file">Aukeratu plano bat</span>
                <img id="logo" src="Eitb_corp.svg.png" alt="EiTB">
                <button id="btn-search" title="Bilatu">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
                </button>
                <div id="zoom-controls">
                    <button id="btn-fit" title="Pantailara egokitu">[ ]</button>
                    <button id="btn-zoom-in" title="Handitu">+</button>
                    <button id="btn-zoom-out" title="Txikitu">&#8722;</button>
                </div>
            </div>

            <div id="search-panel" class="hidden">
                <div id="search-bar">
                    <input id="search-input" type="search" placeholder="Bilatu planoan..." autocomplete="off" spellcheck="false">
                    <button id="btn-search-close" title="Itxi">&#10005;</button>
                </div>
                <div id="search-results"></div>
                <div id="search-empty" class="hidden"></div>
            </div>

            <div id="viewer">
                <div id="placeholder">
                    <p>Aukeratu plano bat karpeta-zuhaitzean</p>
                </div>
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p class="loading-msg">
                        Planoa kargatzen&hellip;<br>
                        <small>Lehen aldian segundo batzuk behar ditzake</small>
                    </p>
                </div>
                <div id="error-panel" class="hidden">
                    <div id="error-msg"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
